apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: deploy-webapp-container-app
  title: Deploy Web App to Azure Container App
  description: Deploy a containerized web application to Azure Container Apps.
  tags:
    - azure
    - container-app
    - webapp
    - deployment
spec:
  owner: aip-team
  type: service

  parameters:
    - title: Azure Subscription
      required:
        - subscriptionId
        - azureToken
      properties:
        subscriptionId:
          title: Subscription ID
          type: string
          description: Azure Subscription ID where resources will be deployed.
          ui:autofocus: true
          default: fea1e9f0-0e20-426f-906e-bc76e5a566ad
        azureToken:
          title: Azure Access Token
          type: string
          description: "Bearer token for Azure Resource Manager. Get it by running: az account get-access-token --resource https://management.azure.com --query accessToken -o tsv"
          ui:widget: password
          ui:help: "Paste the output of: az account get-access-token --resource https://management.azure.com --query accessToken -o tsv"

    - title: Azure Resource Configuration
      required:
        - resourceGroupName
        - location
        - containerAppEnvName
      properties:
        resourceGroupName:
          title: Resource Group Name
          type: string
          description: Name of the Azure Resource Group where resources will be deployed.
          default: IST-GLB-IENO-AIPWE-BOX-RG01
        location:
          title: Azure Region
          type: string
          description: Azure region for the Container App deployment.
          default: westeurope
          oneOf:
            - title: West Europe
              const: westeurope
            - title: North Europe
              const: northeurope
            - title: East US
              const: eastus
            - title: East US 2
              const: eastus2
            - title: Central US
              const: centralus
            - title: West US 2
              const: westus2
            - title: UK South
              const: uksouth
            - title: France Central
              const: francecentral
            - title: Germany West Central
              const: germanywestcentral
            - title: Sweden Central
              const: swedencentral
            - title: Southeast Asia
              const: southeastasia
            - title: Australia East
              const: australiaeast
            - title: Canada Central
              const: canadacentral
        containerAppEnvName:
          title: Container App Environment Name
          type: string
          description: Name of the Azure Container Apps Environment. A new one will be created if it does not exist.
          default: aziece1poc001

    - title: Container Image Configuration
      required:
        - containerAppName
        - imageReference
      properties:
        containerAppName:
          title: Container App Name
          type: string
          description: Name of the Azure Container App to create or update.
          pattern: ^[a-z][a-z0-9-]{0,30}[a-z0-9]$
          ui:help: Lowercase letters, numbers, and hyphens only (2-32 characters). Must start with a letter and end with a letter or number.
        imageReference:
          title: Container Image Reference
          type: string
          description: "Full image reference including registry, name and tag (e.g. nginx:latest, mcr.microsoft.com/azuredocs/containerapps-helloworld:latest, myacr.azurecr.io/myapp:v1.0)."
          default: mcr.microsoft.com/azuredocs/containerapps-helloworld:latest
          ui:help: Use the full image path. For Docker Hub images you can omit the registry (e.g. nginx:latest).
        acrName:
          title: Azure Container Registry Name (optional)
          type: string
          description: "Name of your ACR (without .azurecr.io). Required only when pulling from a private ACR. Leave empty for public images (Docker Hub, MCR, etc.)."
          default: ""

    - title: Application Settings
      properties:
        targetPort:
          title: Target Port
          type: integer
          description: The port your application listens on inside the container.
          default: 80
        ingressEnabled:
          title: Enable Ingress
          type: boolean
          description: Enable external HTTP ingress to the container app.
          default: true
        backstageIp:
          title: Backstage Server Public IP
          type: string
          description: "Public IP of the Backstage server. Only this IP will be allowed to reach the Container App ingress."
          ui:help: "Get it by running: curl -s ifconfig.me"
        cpuCores:
          title: CPU Cores
          type: string
          description: Number of CPU cores allocated to the container.
          default: "0.5"
          oneOf:
            - title: 0.25 cores
              const: "0.25"
            - title: 0.5 cores
              const: "0.5"
            - title: 1.0 cores
              const: "1.0"
            - title: 2.0 cores
              const: "2.0"
        memorySize:
          title: Memory
          type: string
          description: Amount of memory allocated to the container.
          default: "1.0Gi"
          oneOf:
            - title: 0.5 Gi
              const: "0.5Gi"
            - title: 1.0 Gi
              const: "1.0Gi"
            - title: 2.0 Gi
              const: "2.0Gi"
            - title: 4.0 Gi
              const: "4.0Gi"
        minReplicas:
          title: Minimum Replicas
          type: integer
          description: Minimum number of container replicas.
          default: 0
          minimum: 0
          maximum: 30
        maxReplicas:
          title: Maximum Replicas
          type: integer
          description: Maximum number of container replicas for autoscaling.
          default: 3
          minimum: 1
          maximum: 30
        envVars:
          title: Environment Variables
          type: string
          description: "Comma-separated environment variables in KEY=VALUE format (e.g. APP_ENV=production,LOG_LEVEL=info). Leave empty for none."
          default: ""

  steps:
    - id: log-input
      name: Log Input Parameters
      action: debug:log
      input:
        message: |
          Deploying Web App to Azure Container App:
          Subscription: ${{ parameters.subscriptionId }}
          Resource Group: ${{ parameters.resourceGroupName }}
          Location: ${{ parameters.location }}
          Container App Environment: ${{ parameters.containerAppEnvName }}
          Container App Name: ${{ parameters.containerAppName }}
          Image: ${{ parameters.imageReference }}
          ACR Auth: ${{ parameters.acrName or 'none (public image)' }}
          Target Port: ${{ parameters.targetPort }}
          Ingress Enabled: ${{ parameters.ingressEnabled }}
          CPU: ${{ parameters.cpuCores }}
          Memory: ${{ parameters.memorySize }}
          Min Replicas: ${{ parameters.minReplicas }}
          Max Replicas: ${{ parameters.maxReplicas }}
          Environment Variables: ${{ parameters.envVars }}

    - id: check-container-app-environment
      name: Check if Container App Environment exists
      action: http:request
      input:
        method: GET
        url: "https://management.azure.com/subscriptions/${{ parameters.subscriptionId }}/resourceGroups/${{ parameters.resourceGroupName }}/providers/Microsoft.App/managedEnvironments/${{ parameters.containerAppEnvName }}?api-version=2024-03-01"
        headers:
          Authorization: Bearer ${{ parameters.azureToken }}
        continueOnBadResponse: true

    - id: create-container-app-environment
      name: Create Container App Environment
      if: ${{ steps['check-container-app-environment'].output.code == 404 }}
      action: http:request
      input:
        method: PUT
        url: "https://management.azure.com/subscriptions/${{ parameters.subscriptionId }}/resourceGroups/${{ parameters.resourceGroupName }}/providers/Microsoft.App/managedEnvironments/${{ parameters.containerAppEnvName }}?api-version=2024-03-01"
        headers:
          Content-Type: application/json
          Authorization: Bearer ${{ parameters.azureToken }}
        body: |
          {
            "location": "${{ parameters.location }}",
            "properties": {
              "workloadProfiles": [
                {
                  "name": "Consumption",
                  "workloadProfileType": "Consumption"
                }
              ],
              "zoneRedundant": false
            }
          }

    - id: wait-for-environment
      name: Wait for Container App Environment to be ready
      action: http:request:poll
      input:
        url: "https://management.azure.com/subscriptions/${{ parameters.subscriptionId }}/resourceGroups/${{ parameters.resourceGroupName }}/providers/Microsoft.App/managedEnvironments/${{ parameters.containerAppEnvName }}?api-version=2024-03-01"
        headers:
          Authorization: Bearer ${{ parameters.azureToken }}
        jsonPathField: properties.provisioningState
        expectedValue: Succeeded
        intervalMs: 10000
        timeoutMs: 300000

    - id: create-container-app
      name: Create or Update Container App
      action: http:request
      input:
        method: PUT
        url: "https://management.azure.com/subscriptions/${{ parameters.subscriptionId }}/resourceGroups/${{ parameters.resourceGroupName }}/providers/Microsoft.App/containerApps/${{ parameters.containerAppName }}?api-version=2024-03-01"
        headers:
          Content-Type: application/json
          Authorization: Bearer ${{ parameters.azureToken }}
        body: |
          {
            "location": "${{ parameters.location }}",
            "properties": {
              "managedEnvironmentId": "/subscriptions/${{ parameters.subscriptionId }}/resourceGroups/${{ parameters.resourceGroupName }}/providers/Microsoft.App/managedEnvironments/${{ parameters.containerAppEnvName }}",
              "configuration": {
                "ingress": {
                  "external": ${{ parameters.ingressEnabled }},
                  "targetPort": ${{ parameters.targetPort }},
                  "transport": "auto",
                  "allowInsecure": false,
                  "ipSecurityRestrictions": [
                    {
                      "name": "backstage-server",
                      "description": "Allow only Backstage server",
                      "ipAddressRange": "${{ parameters.backstageIp }}/32",
                      "action": "Allow"
                    }
                  ]
                },
                "registries": ${{ ("[{\"server\": \"" + parameters.acrName + ".azurecr.io\", \"identity\": \"system\"}]") if parameters.acrName else "[]" }}
              },
              "template": {
                "containers": [
                  {
                    "name": "${{ parameters.containerAppName }}",
                    "image": "${{ parameters.imageReference }}",
                    "resources": {
                      "cpu": ${{ parameters.cpuCores }},
                      "memory": "${{ parameters.memorySize }}"
                    }
                  }
                ],
                "scale": {
                  "minReplicas": ${{ parameters.minReplicas }},
                  "maxReplicas": ${{ parameters.maxReplicas }}
                }
              }
            },
            "identity": {
              "type": "SystemAssigned"
            }
          }

    - id: wait-for-container-app
      name: Wait for Container App to be ready
      action: http:request:poll
      input:
        url: "https://management.azure.com/subscriptions/${{ parameters.subscriptionId }}/resourceGroups/${{ parameters.resourceGroupName }}/providers/Microsoft.App/containerApps/${{ parameters.containerAppName }}?api-version=2024-03-01"
        headers:
          Authorization: Bearer ${{ parameters.azureToken }}
        jsonPathField: properties.provisioningState
        expectedValue: Succeeded
        intervalMs: 10000
        timeoutMs: 300000

    - id: register-catalog-entity
      name: Register deployed app in Backstage catalog
      action: catalog:register:inline
      input:
        entity:
          apiVersion: backstage.io/v1alpha1
          kind: Component
          metadata:
            name: ${{ parameters.containerAppName }}
            description: "Web application deployed to Azure Container Apps"
            annotations:
              webapp.io/url: https://${{ steps['wait-for-container-app'].output.body.properties.configuration.ingress.fqdn }}
            links:
              - url: https://${{ steps['wait-for-container-app'].output.body.properties.configuration.ingress.fqdn }}
                title: Open Web Application
              - url: https://portal.azure.com/#browse/Microsoft.App%2FcontainerApps
                title: Azure Portal
          spec:
            type: website
            lifecycle: production
            owner: aip-team

  output:
    links:
      - title: Open Web Application
        url: https://${{ steps['wait-for-container-app'].output.body.properties.configuration.ingress.fqdn }}
      - title: View in Backstage Catalog
        entityRef: ${{ steps['register-catalog-entity'].output.entityRef }}
      - title: Azure Portal - Container Apps
        url: https://portal.azure.com/#browse/Microsoft.App%2FcontainerApps
      - title: Azure Container Apps Documentation
        url: https://learn.microsoft.com/en-us/azure/container-apps/
    message: |
      Your web application '${{ parameters.containerAppName }}' has been deployed to Azure Container Apps.

      Application URL: https://${{ steps['wait-for-container-app'].output.body.properties.configuration.ingress.fqdn }}
      Container App: ${{ parameters.containerAppName }}
      Image: ${{ parameters.imageReference }}
      Location: ${{ parameters.location }}
      Resources: ${{ parameters.cpuCores }} CPU / ${{ parameters.memorySize }} Memory
      Replicas: ${{ parameters.minReplicas }}-${{ parameters.maxReplicas }}
