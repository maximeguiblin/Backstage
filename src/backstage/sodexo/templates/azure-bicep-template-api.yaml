---
# Example: Expose Bicep Template as API Entity
# This file demonstrates how to register a Backstage template as an API
# Add this to your catalog locations in app-config.yaml
apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: bicep-provisioning-api
  title: Bicep Resource Provisioning API
  description: 1 API for provisioning Azure resources using Bicep templates via Backstage scaffolder
  tags:
    - azure
    - bicep
    - provisioning
    - scaffolder
  links:
    - url: http://localhost:3000/create/template/default/trigger-bicep-pipeline
      title: Use Template in UI
      icon: launch
spec:
  type: openapi
  lifecycle: production
  owner: platform-team
  system: developer-platform
  definition: |
    openapi: 3.0.3
    info:
      title: Bicep Resource Provisioning API
      description: |
        API for executing the Backstage Bicep provisioning template.
        This API wraps the Backstage scaffolder template execution.
      version: 1.0.0
    servers:
      - url: http://localhost:7007
        description: Backstage Backend API
    paths:
      /api/scaffolder/v2/templates:
        get:
          summary: List Available Templates
          description: Retrieve a list of all available scaffolder templates registered in the Backstage catalog.
          operationId: listTemplates
          responses:
            '200':
              description: List of available templates
              content:
                application/json:
                  schema:
                    type: object
                    properties:
                      items:
                        type: array
                        description: List of template entities
                        items:
                          type: object
                          properties:
                            apiVersion:
                              type: string
                              example: scaffolder.backstage.io/v1beta3
                            kind:
                              type: string
                              example: Template
                            metadata:
                              type: object
                              properties:
                                name:
                                  type: string
                                  example: trigger-bicep-pipeline
                                namespace:
                                  type: string
                                  example: default
                                title:
                                  type: string
                                description:
                                  type: string
                            spec:
                              type: object
                              properties:
                                owner:
                                  type: string
                                type:
                                  type: string
                      totalItems:
                        type: integer
                        example: 1
            '401':
              description: Unauthorized
            '500':
              description: Internal server error
      /api/scaffolder/v2/tasks:
        post:
          summary: Execute Bicep Provisioning Template
          description: |
            Execute the Bicep provisioning template with the provided parameters.
            This will trigger the Azure DevOps pipeline to provision resources.
            The template namespace is 'default' and template name is 'trigger-bicep-pipeline'.
          operationId: executeBicepTemplate
          requestBody:
            required: true
            content:
              application/json:
                schema:
                  type: object
                  required:
                    - templateRef
                    - values
                  properties:
                    templateRef:
                      type: string
                      description: Reference to the template in format 'namespace:name'
                      example: "template:default/trigger-bicep-pipeline"
                    values:
                      type: object
                      description: Template parameter values
                      required:
                        - resource_group
                        - resource_suffix
                        - pattern
                      properties:
                        resource_group:
                          type: string
                          description: Name of the existing Resource Group
                          example: IST-GLB-IENO-AIPWE-BOX-RG01
                        resource_suffix:
                          type: string
                          description: Suffix for naming instances (must be 6 characters)
                          minLength: 6
                          maxLength: 6
                          example: "aip001"
                        pattern:
                          type: string
                          description: Select a pattern
                          enum:
                            - pattern_sandbox_adb
                            - pattern_sandbox_amls
                          example: pattern_sandbox_adb
                        extra_resources:
                          type: array
                          description: Select extra resources
                          items:
                            type: string
                            enum:
                              - databricks
                              - datafactory
                              - datalake
                              - aisearch
                              - openai
                              - foundry
                          example: ["openai"]
                        user_login:
                          type: string
                          description: Use your login identity
                          enum: ["true", "false"]
                          default: "true"
                        project_repository_url:
                          type: string
                          description: Repository URL where infra config files will be pushed
                          format: uri
                          example: "https://sdxcloud.visualstudio.com/IST.GLB.GLB.DataFactory_DeveloperPlatform/_git/my-project"
                        configure_params:
                          type: string
                          description: Automatically configure infra parameters in keyvault
                          enum: ["true", "false"]
                          default: "true"
                        openai_location:
                          type: string
                          description: Azure region for OpenAI (required if openai in extra_resources)
                          enum:
                            - australiaeast
                            - brazilsouth
                            - canadacentral
                            - centralindia
                            - centralus
                            - eastasia
                            - eastus
                            - eastus2
                            - francecentral
                            - germanywestcentral
                            - israelcentral
                            - italynorth
                            - japaneast
                            - koreacentral
                            - northeurope
                            - norwayeast
                            - polandcentral
                            - qatarcentral
                            - southafricanorth
                            - southcentralus
                            - southeastasia
                            - swedencentral
                            - switzerlandnorth
                            - uaenorth
                            - uksouth
                            - westeurope
                            - westus2
                            - westus3
                example:
                  templateRef: "template:default/trigger-bicep-pipeline"
                  values:
                    resource_group: "IST-GLB-IENO-AIPWE-BOX-RG01"
                    resource_suffix: "aip001"
                    pattern: "pattern_sandbox_adb"
                    extra_resources: ["openai"]
                    user_login: "true"
                    project_repository_url: "https://sdxcloud.visualstudio.com/IST.GLB.GLB.DataFactory_DeveloperPlatform/_git/my-project"
                    configure_params: "true"
                    openai_location: "australiaeast"
          responses:
            '200':
              description: Template execution started successfully
              content:
                application/json:
                  schema:
                    type: object
                    properties:
                      id:
                        type: string
                        description: Task ID for tracking execution
                      status:
                        type: string
                        enum: [open, processing, failed, completed]
            '400':
              description: Invalid request parameters
            '401':
              description: Unauthorized
            '500':
              description: Internal server error
      /api/scaffolder/v2/tasks/{taskId}:
        get:
          summary: Get Template Execution Status
          description: Check the status of a template execution task
          operationId: getTaskStatus
          parameters:
            - name: taskId
              in: path
              required: true
              schema:
                type: string
          responses:
            '200':
              description: Task status
              content:
                application/json:
                  schema:
                    type: object
                    properties:
                      id:
                        type: string
                      status:
                        type: string
                        enum: [open, processing, failed, completed]
                      spec:
                        type: object
                      output:
                        type: object

