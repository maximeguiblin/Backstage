apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: register-webapp-catalog
  title: Register Web App in Backstage Catalog
  description: Register an existing web application as a Backstage catalog entity with an embedded iframe preview.
  tags:
    - webapp
    - catalog
    - register
spec:
  owner: aip-team
  type: service

  parameters:
    - title: Web Application Details
      required:
        - entityName
        - webappUrl
      properties:
        entityName:
          title: Entity Name
          type: string
          description: Name for the catalog entity (lowercase, hyphens allowed).
          pattern: ^[a-z][a-z0-9-]{0,62}[a-z0-9]$
          ui:autofocus: true
          ui:help: "Lowercase letters, numbers, and hyphens only. Must start with a letter and end with a letter or number."
        webappUrl:
          title: Web Application URL
          type: string
          description: "Full URL of the web application (e.g. https://my-app.azurecontainerapps.io)."
          ui:help: "This URL will be displayed in an iframe in the Backstage catalog."
        description:
          title: Description
          type: string
          description: Short description of the web application.
          default: ""

    - title: Catalog Metadata
      properties:
        componentType:
          title: Component Type
          type: string
          description: Type of the catalog component.
          default: website
          oneOf:
            - title: Website
              const: website
            - title: Service
              const: service
            - title: Library
              const: library
        lifecycle:
          title: Lifecycle
          type: string
          description: Lifecycle stage of the application.
          default: production
          oneOf:
            - title: Production
              const: production
            - title: Experimental
              const: experimental
            - title: Deprecated
              const: deprecated
        owner:
          title: Owner
          type: string
          description: Team or user owning this component.
          default: aip-team

  steps:
    - id: log-input
      name: Log Input Parameters
      action: debug:log
      input:
        message: |
          Registering Web App in Backstage catalog:
          Entity Name: ${{ parameters.entityName }}
          Web App URL: ${{ parameters.webappUrl }}
          Description: ${{ parameters.description }}
          Type: ${{ parameters.componentType }}
          Lifecycle: ${{ parameters.lifecycle }}
          Owner: ${{ parameters.owner }}

    - id: register-catalog-entity
      name: Register entity in Backstage catalog
      action: catalog:register:inline
      input:
        entity:
          apiVersion: backstage.io/v1alpha1
          kind: Component
          metadata:
            name: ${{ parameters.entityName }}
            description: ${{ parameters.description or 'Web application registered in Backstage' }}
            annotations:
              webapp.io/url: ${{ parameters.webappUrl }}
            links:
              - url: ${{ parameters.webappUrl }}
                title: Open Web Application
          spec:
            type: ${{ parameters.componentType }}
            lifecycle: ${{ parameters.lifecycle }}
            owner: ${{ parameters.owner }}

  output:
    links:
      - title: View in Backstage Catalog
        entityRef: ${{ steps['register-catalog-entity'].output.entityRef }}
      - title: Open Web Application
        url: ${{ parameters.webappUrl }}
    message: |
      Web application '${{ parameters.entityName }}' has been registered in the Backstage catalog.

      Entity: ${{ steps['register-catalog-entity'].output.entityRef }}
      Web App URL: ${{ parameters.webappUrl }}

      The webapp is viewable from the "Webapp" tab in the catalog entity page.
