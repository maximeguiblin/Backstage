apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: azure-project-onboarding
  title: Azure Project Onboarding with Patterns
  description: A template to onboard a new project using Azure cloud architecture patterns.
  tags:
    - azure
    - patterns
    - onboarding
spec:
  owner: DevSecOps
  type: service

  # Parameters to gather input data for project onboarding
  parameters:
    - title: Basic Project Information
      required:
        - projectName
        - applicationName
        - sraqID
        - cristalID
      properties:
        projectName:
          title: Project Name
          type: string
          description: Name of your project
          ui:autofocus: true
        applicationName:
          title: Application Name
          type: string
          description: Name of the application (will be used as the repository name)
        sraqID:
          title: SRAQ ID
          type: string
          description: Security Risk Assessment Questionnaire ID
          pattern: ^SRAQ-[0-9]+$
          ui:help: Format should be SRAQ-XXXXX
        cristalID:
          title: Cristal ID
          type: string
          description: Cristal ID for the project
          pattern: ^CR-[0-9]+$
          ui:help: Format should be CR-XXXXX

    - title: Project Coding
      required:
        - threeLetterCode
        - eightLetterCode
      properties:
        threeLetterCode:
          title: Three-letter Code
          type: string
          description: Three-letter project identifier
          minLength: 3
          maxLength: 3
          ui:help: Must be exactly 3 characters
        eightLetterCode:
          title: Eight-letter Project Code
          type: string
          description: Project code (max 8 characters, must start with the 3-letter code)
          minLength: 4
          maxLength: 8
          ui:help: Maximum 8 characters, must start with the same 3-letter code

    - title: Pattern Selection
      required:
        - pattern
        - locations
      properties:
        pattern:
          title: Cloud Architecture Pattern
          type: string
          description: Select the cloud architecture pattern to use
          enum:
            - ADFB
            - ADFBML
            - ADFBMLGTW
            - ADFBPBID
            - ADFML
            - AMLAKSGTW
            - SHPOINTFTPADFADB
            - ADFMLD
            - ADFBMLPBID
            - ADFBMLGTWD
            - ADFMLOPENAI
            - ADFDBMLOPENAI
            - ADFBMLOPENAIGTW
            - SHPOINTADFAML
            - SHPOINTADFADB
          ui:help: |
            ADFB - Azure Data Factory + Databricks
            ADFBML - ADF + Databricks + Machine Learning
            AMLAKSGTW - Azure ML + AKS + API Gateway
            See documentation for more details on each pattern
        locations:
          title: Azure Regions
          type: string
          description: Azure regions for deployment (comma-separated)
          default: northeurope
          ui:help: e.g. northeurope,eastus2

    - title: Azure DevOps Configuration
      required:
        - organizationName
        - projectNameADO
      properties:
        organizationName:
          title: ADO Organization Name
          type: string
          description: Azure DevOps organization name
          default: sdxcloud
        projectNameADO:
          title: ADO Project Name
          type: string
          description: Azure DevOps project name
          default: IST.GLB.GLB.DataDigitalFactory_24HCloudFormation

  # These steps are executed in the scaffolder backend
  steps:
    - id: log-input
      name: Log Input Parameters
      action: debug:log
      input:
        message: |
          Received request to onboard a project with the following details:
          Project Name: ${{ parameters.projectName }}
          Application Name: ${{ parameters.applicationName }}
          SRAQ ID: ${{ parameters.sraqID }}
          Cristal ID: ${{ parameters.cristalID }}
          Three-letter Code: ${{ parameters.threeLetterCode }}
          Eight-letter Code: ${{ parameters.eightLetterCode }}
          Pattern: ${{ parameters.pattern }}
          Locations: ${{ parameters.locations }}
          ADO Organization: ${{ parameters.organizationName }}
          ADO Project: ${{ parameters.projectNameADO }}
          
    - id: validate-inputs
      name: Validate Inputs
      action: debug:log
      input:
        message: |
          Validating inputs for project onboarding
          
    - id: check-credentials
      name: Check Azure Credentials
      action: debug:log
      input:
        message: |
          Checking Azure DevOps credentials and permissions
          
    - id: debug-api-path
      name: Debug API Path
      action: debug:log
      input:
        message: |
          Attempting to call Azure DevOps API:
          Organization: ${{ parameters.organizationName }}
          Project: ${{ parameters.projectNameADO }}
          Pipeline ID: 8651
          
    - id: trigger-pipeline
      name: Trigger Project Onboarding Pipeline
      action: http:backstage:request
      input:
        method: POST
        url: https://dev.azure.com
        path: /api/proxy/azure-devops/${{ parameters.organizationName }}/${{ parameters.projectNameADO }}/_apis/pipelines/8651/runs
        params:
          'api-version': '7.1-preview.1'
        headers:
          Content-Type: application/json
        body: |
          {
            "resources": {
              "repositories": {
                "self": {
                  "refName": "refs/heads/main"
                }
              }
            },
            "templateParameters": {
              "pattern": "${{ parameters.pattern }}",
              "projectName": "${{ parameters.projectName }}",
              "applicationName": "${{ parameters.applicationName }}",
              "sraqID": "${{ parameters.sraqID }}",
              "cristalID": "${{ parameters.cristalID }}",
              "locations": "${{ parameters.locations }}",
              "organizationName": "${{ parameters.organizationName }}",
              "projectNameADO": "${{ parameters.projectNameADO }}",
              "threeLetterCode": "${{ parameters.threeLetterCode }}",
              "eightLetterCode": "${{ parameters.eightLetterCode }}"
            }
          }

    - id: track-pipeline
      name: Track Pipeline Execution
      action: debug:log
      input:
        message: |
          Project onboarding pipeline triggered successfully.
          Tracking pipeline execution status...

  # Outputs are displayed to the user after a successful execution
  output:
    links:
      - title: Azure DevOps Pipeline
        url: https://dev.azure.com/${{ parameters.organizationName }}/${{ parameters.projectNameADO }}/_build?definitionId=8651
      - title: Patterns Documentation
        url: https://sdxcloud.visualstudio.com/IST.GLB.GLB.DataDigitalFactory_24HCloudFormation/_wiki/wikis/IST.GLB.GLB.DataDigitalFactory_24HCloudFormation.wiki/34714/06-HOW-USE-PATTERNS-FOR-PROJECT-DEPLOY-THEM
    message: |
      Your project '${{ parameters.projectName }}' onboarding has been initiated using the ${{ parameters.pattern }} pattern.
      
      Pattern: ${{ parameters.pattern }}
      Application Name: ${{ parameters.applicationName }}
      Locations: ${{ parameters.locations }}
      
      The pipeline will create the necessary infrastructure and repository setup.
      You can track the progress in the Azure DevOps pipeline.