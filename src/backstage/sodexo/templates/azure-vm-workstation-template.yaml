apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: provision-dev-vm-workstation
  title: Provision Data Factory Developer VM Workstation
  description: |
    Self-service template to provision a Virtual Machine workstation for Data Factory developers.
    This template triggers the existing Azure DevOps pipelines to deploy, harden, and configure backup for the VM.
  tags:
    - azure
    - virtual-machine
    - data-factory
    - self-service
spec:
  owner: DevSecOps
  type: resource

  parameters:
    - title: VM Configuration
      required:
        - virtualMachineNames
        - requesterEmail
      properties:
        virtualMachineNames:
          title: VM Name(s)
          type: array
          description: List of virtual machine names to provision.
          items:
            type: string
            pattern: "^[A-Za-z0-9-]+$"
          ui:autofocus: true
          ui:options:
            addable: true
            orderable: false
        requesterEmail:
          title: Requester Email
          type: string
          description: Email address of the person requesting the VM (for approval notifications)
          format: email
        businessJustification:
          title: Business Justification
          type: string
          description: Brief explanation of why this VM is needed
          ui:widget: textarea
          ui:options:
            rows: 3

    - title: Post-Deployment Options
      properties:
        runHardening:
          title: Run Hardening Pipeline
          type: boolean
          description: Automatically run security hardening (VRIASUIT) after VM deployment
          default: true
        configureBackup:
          title: Configure Backup
          type: boolean
          description: Trigger the infrastructure backup pipeline
          default: true
        vmResourceGroup:
          title: VM Resource Group
          type: string
          description: Resource group for hardening pipeline
          default: GLB-GLB-IENO-VMDWS-PRD-RG01
        vmSubscription:
          title: VM Subscription
          type: string
          description: Subscription for hardening pipeline
          default: SDX STA/PRD
        whatIfInfraDeployment:
          title: What-If infra deployment (dry run)
          type: boolean
          description: Only show changes during backup pipeline execution
          default: false

  steps:
    # Step 1: Validate inputs
    - id: validate-inputs
      name: Validate VM Names
      action: debug:log
      input:
        message: |
          Validating inputs...
          VM Names count: ${{ parameters.virtualMachineNames | length }}
          VM Names: ${{ parameters.virtualMachineNames | join(",") }}

    # Step 2: Log request details
    - id: log-request
      name: Log VM Provisioning Request
      action: debug:log
      input:
        message: |
          🖥️ VM Workstation Provisioning Request
          ========================================
          VM Name(s): ${{ parameters.virtualMachineNames | join(",") }}
          Requester: ${{ parameters.requesterEmail }}
          Justification: ${{ parameters.businessJustification }}
          
          Options:
          - Run Hardening: ${{ parameters.runHardening }}
          - Configure Backup: ${{ parameters.configureBackup }}

    # Step 3: Deploy VM using CSL pipeline
    - id: deploy-vm
      name: Deploy Virtual Machine(s)
      action: azure:pipeline:run
      input:
        organization: "sdxcloud"
        project: "IST.GLB.GLB.DataFactory_DevVMWorkstations"
        pipelineId: "5302"
        branch: "main"
        pipelineParameters:
          virtualMachinesNames: ${{ parameters.virtualMachineNames }}

    # Step 4: Run Hardening pipeline (conditional)
    - id: run-hardening
      name: Run Security Hardening
      if: ${{ parameters.runHardening }}
      action: azure:pipeline:run
      input:
        organization: "sdxcloud"
        project: "IST.GLB.GLB.DataFactory_DevVMWorkstations"
        pipelineId: "5307"
        branch: "main"
        pipelineParameters:
          vmResourceGroup: ${{ parameters.vmResourceGroup }}
          vmSubscription: ${{ parameters.vmSubscription }}
          virtualMachinesNames: ${{ parameters.virtualMachineNames }}

    # Step 5: Configure Backup (conditional)
    - id: configure-backup
      name: Configure Backup
      if: ${{ parameters.configureBackup }}
      action: azure:pipeline:run
      input:
        organization: "sdxcloud"
        project: "IST.GLB.GLB.DataFactory_DevVMWorkstations"
        pipelineId: "5294"
        branch: "main"
        pipelineParameters:
          whatIfInfraDeployment: ${{ parameters.whatIfInfraDeployment | lower }}

  output:
    links:
      - title: View VM Deployment Pipeline
        url: https://sdxcloud.visualstudio.com/IST.GLB.GLB.DataFactory_DevVMWorkstations/_build?definitionId=5302
      - title: View Hardening Pipeline
        url: https://sdxcloud.visualstudio.com/IST.GLB.GLB.DataFactory_DevVMWorkstations/_build?definitionId=5307
      - title: View Backup Pipeline
        url: https://sdxcloud.visualstudio.com/IST.GLB.GLB.DataFactory_DevVMWorkstations/_build?definitionId=5294
      - title: Wiki Documentation
        url: https://sdxcloud.visualstudio.com/IST.GLB.GLB.DataFactory_DevVMWorkstations/_wiki/wikis/IST.GLB.GLB.DataFactory_DevVMWorkstations.wiki/23912/Deploy-a-virtual-machine-for-new-Data-Factory-developer
