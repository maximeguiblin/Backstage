apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: provision-azure-vm
  title: Provision Azure Virtual Machine
  description: A template to provision a Virtual Machine in Azure.
  tags:
    - azure
    - virtual-machine
spec:
  owner: DevSecOps
  type: resource

  # Parameters to gather input data for VM provisioning
  parameters:
    - title: Basic Information
      required:
        - organization
        - projectName
      properties:
        organization:
          title: Organization
          type: string
          description: Organization name in Azure
          default: sdxcloud
          ui:autofocus: true
        projectName:
          title: Project Name
          type: string
          description: Name of the project

    - title: Resource Details
      required:
        - resourceGroupName
        - location
      properties:
        resourceGroupName:
          title: Resource Group
          type: string
          description: Name of the Azure resource group
        location:
          title: Location
          type: string
          description: Azure region for the virtual machine
          enum:
            - eastus
            - westus
            - westeurope
            - northeurope
            - eastasia
            - southeastasia

    - title: Virtual Machine Configuration
      required:
        - virtualMachineName
        - size
        - osVersion
      properties:
        virtualMachineName:
          title: VM Name
          type: string
          description: Name of the virtual machine
        size:
          title: VM Size
          type: string
          description: Size of the virtual machine
          enum:
            - Standard_D2s_v3
            - Standard_D4s_v3
            - Standard_D8s_v3
            - Standard_B2ms
            - Standard_B4ms
            - Standard_B8ms
        osVersion:
          title: OS Version
          type: string
          description: Operating system version for the virtual machine
          enum:
            - Ubuntu 20.04-LTS
            - Windows Server 2019
            - Windows Server 2022
            - Red Hat Enterprise Linux 8

  # These steps are executed in the scaffolder backend
  steps:
    - id: log-input-parameters
      name: Log Input Parameters
      action: debug:log
      input:
        message: |
          Received request to provision a VM with the following details:
          Organization: ${{ parameters.organization }}
          Project Name: ${{ parameters.projectName }}
          Resource Group: ${{ parameters.resourceGroupName }}
          VM Name: ${{ parameters.virtualMachineName }}
          Location: ${{ parameters.location }}
          Size: ${{ parameters.size }}
          OS Version: ${{ parameters.osVersion }}
    - id: validate-inputs
      name: Validate Inputs
      action: debug:log
      input:
        message: |
          Validating inputs for VM provisioning
    - id: check-credentials
      name: Checking credentials
      action: debug:log
      input:
        message: |
          Checking login credentials and permissions for Azure VM provisioning          
    # Placeholder for Azure VM provisioning - would be implemented with actual Azure actions
    - id: provision-vm
      name: Provision Virtual Machine
      action: debug:log
      input:
        message: "VM Provisioning completed successfully (mock operation)"

  # Outputs are displayed to the user after a successful execution
  output:
    links:
      - title: Azure Portal
        url: https://portal.azure.com/#blade/HubsExtension/BrowseResourceBlade/resourceType/Microsoft.Compute%2FVirtualMachines
      - title: Documentation
        url: https://learn.microsoft.com/en-us/azure/virtual-machines/
    message: |
      Your Azure VM '${{ parameters.virtualMachineName }}' has been successfully provisioned (mock).
      Location: ${{ parameters.location }}
      Size: ${{ parameters.size }}
      OS: ${{ parameters.osVersion }}