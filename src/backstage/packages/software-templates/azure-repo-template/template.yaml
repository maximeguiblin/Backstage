apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: trigger-azure-pipeline
  title: Trigger Azure DevOps Pipeline with Cookiecutter Config
  description: Collects parameters and triggers an Azure DevOps pipeline with them.
spec:
  owner: platform-team
  type: service

  parameters:
    - title: Cookiecutter Parameters
      required:
        - author_name
        - author_email
        - project_name
        - project_slug
        - project_short_description
        - project_infra
        - usecase_name
        - version
        - code_license
        - add_notebooks
        - organization
        - project
        - branch
      properties:
        author_name:
          default: "Data Factory"
          type: string
        author_email:
          default: "nicolas.marchand@sodexo.com"
          type: string
        project_name:
          default: "Test-Dummy-Project"
          type: string
        project_slug:
          default: "test_dummy_project"
          type: string
        project_short_description:
          type: string
        project_infra:
          type: string
          description: "Choose the type of infrastructure this project will target"
          enum: ["1", "2", "3", "4", "5"]
          enumNames:
            - "ADB"
            - "AML"
            - "AML2"
            - "APP"
            - "ALL"
        usecase_name:
          default: "test_dummy_project"
          type: string
        version:
          type: string
          default: "0.1.0"
        code_license:
          type: string
          description: "Choose the licence for this project"
          enum: ["1", "2", "3", "4", "5", "6"]
          enumNames:
            - "SODEXO license"
            - "MIT license"
            - "BSD license"
            - "ISC license"
            - "Apache Software License 2.0"
            - "GNU General Public License v3"
        add_notebooks:
          default: "n"
          type: string
          enum: ["y", "n"]
        organization:
          type: string
        project:
          type: string
        branch:
          type: string
          default: main

  steps:
    - id: run-azure-pipeline
      name: Trigger Azure DevOps Pipeline
      action: azure:pipeline:run
      input:
        organization: ${{ parameters.organization }}
        project: ${{ parameters.project }}
        pipelineId: "8853"
