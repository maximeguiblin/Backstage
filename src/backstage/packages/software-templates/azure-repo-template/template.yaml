apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: trigger-azure-pipeline
  title: Trigger Azure DevOps Pipeline with Cookiecutter Config
  description: Collects parameters and triggers an Azure DevOps pipeline with them.
spec:
  owner: platform-team
  type: service

  parameters:
    - title: Cookiecutter Parameters
      required:
        - author_name
        - author_email
        - project_name
        - project_slug
        - project_short_description
        - project_infra
        - usecase_name
        - version
        - code_license
        - add_notebooks
        - organization
        - project
        - pipelineId
        - branch
      properties:
        author_name:
          default: "Data Factory"
          type: string
        author_email:
          default: "nicolas.marchand@sodexo.com"
          type: string
        project_name:
          default: "Test-Dummy-Project"
          type: string
        project_slug:
          default: "test_dummy_project"
          type: string
        project_short_description:
          type: string
        project_infra:
          type: string
          description: "Choose the type of infrastructure this project will target"
          enum: ["1", "2", "3", "4", "5"]
          enumNames:
            - "ADB"
            - "AML"
            - "AML2"
            - "APP"
            - "ALL"
        usecase_name:
          default: "test_dummy_project"
          type: string
        version:
          type: string
          default: "0.1.0"
        code_license:
          type: string
          description: "Choose the licence for this project"
          enum: ["1", "2", "3", "4", "5", "6"]
          enumNames:
            - "SODEXO license"
            - "MIT license"
            - "BSD license"
            - "ISC license"
            - "Apache Software License 2.0"
            - "GNU General Public License v3"
        add_notebooks:
          default: "n"
          type: string
          enum: ["y", "n"]
        organization:
          type: string
        project:
          type: string
        pipelineId:
          type: string
        branch:
          type: string
          default: main

  steps:
    - id: write-config
      name: Write config JSON for pipeline
      action: fs:write
      input:
        path: cookiecutter-config.json
        content: |
          {
            "author_name": "${{ parameters.author_name }}",
            "author_email": "${{ parameters.author_email }}",
            "project_name": "${{ parameters.project_name }}",
            "project_slug": "${{ parameters.project_slug }}",
            "project_short_description": "${{ parameters.project_short_description }}",
            "project_infra": "${{ parameters.project_infra }}",
            "usecase_name": "${{ parameters.usecase_name }}",
            "version": "${{ parameters.version }}",
            "code_license": "${{ parameters.code_license }}",
            "add_notebooks": "${{ parameters.add_notebooks }}"
          }

    - id: trigger-pipeline
      name: Trigger Azure DevOps Pipeline
      action: azure:devops:runPipelineWithParameters
      input:
        organization: ${{ parameters.organization }}
        project: ${{ parameters.project }}
        pipelineId: ${{ parameters.pipelineId }}
        branch: ${{ parameters.branch }}
        filePath: cookiecutter-config.json
