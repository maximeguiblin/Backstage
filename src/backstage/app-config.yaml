app:
  title: Sodexo Developer Portal
  baseUrl: http://localhost:3000
  listen:
    port: 3000
    # Uncomment the following host directive to bind to specific interfaces
    host: 0.0.0.0

azureDevOps:
  host: dev.azure.com
  organization: sdxcloud
  token: ${BACKSTAGE_DEVOPS_TOKEN}

sonarqube:
  instances:
    - name: default
      instanceKey: sonarcloud
      baseUrl: https://sonarcloud.io # optional, defaults to https://sonarcloud.io
      apiKey: f659d7beefe969db57afff141582e46ee3a63b4b # optional, defaults to empty string

organization:
  name: Sodexo

backend:
  # Used for enabling authentication, secret is shared by all backend plugins
  # See https://backstage.io/docs/auth/service-to-service-auth for
  # information on the format
  # auth:
  #   keys:
  #     - secret: ${BACKEND_SECRET}
  
  # Disable default auth policy for local development
  # WARNING: DO NOT use this in production!
  auth:
    dangerouslyDisableDefaultAuthPolicy: true
  
  baseUrl: http://localhost:7007
  listen:
    port: 7007
    # Uncomment the following host directive to bind to specific interfaces
    host: 0.0.0.0
  csp:
    connect-src: ["'self'", 'http:', 'https:']
    # Content-Security-Policy directives follow the Helmet format: https://helmetjs.github.io/#reference
    # Default Helmet Content-Security-Policy values can be removed by setting the key to false
  cors:
    origin: 
      - http://localhost:3000
      - http://localhost:7007
    methods: [GET, HEAD, PATCH, POST, PUT, DELETE]
    credentials: true
  # workingDirectory: /tmp # Use this to configure a working directory for the scaffolder, defaults to the OS temp-dir
  # This is for local development only, it is not recommended to use this in production
  # The production database configuration is stored in app-config.production.yaml
  database:
    client: better-sqlite3
    connection: ':memory:'
  proxy:
    endpoints:
      # This is an example of how to set up a proxy endpoint for Azure DevOps
      # The path is prefixed with /proxy/azure-devops, so the full URL would be
      # http://localhost:7007/proxy/azure-devops/{organization}/{project}/_apis/pipelines/{pipelineId}/runs
      '/proxy/azure-devops':
        target: https://dev.azure.com
        changeOrigin: true
        # Remove the proxy path when forwarding the request
        pathRewrite:
          '^/proxy/azure-devops': ''
        # Format authorization header according to Azure DevOps API requirements
        headers:
          Authorization: ${{ 'Basic ' + Buffer.from(':' + env.BACKSTAGE_DEVOPS_TOKEN).toString('base64') }}
        # Allow headers to pass through
        allowedHeaders: ['Authorization', 'Content-Type']
      # Optional: proxy for SonarCloud (e.g. if frontend needs it). SonarCloud uses Bearer token.
      # '/sonarcloud':
      #   target: https://sonarcloud.io
      #   changeOrigin: true
      #   pathRewrite:
      #     '^/sonarcloud': ''
      #   headers:
      #     Authorization: ${{ 'Bearer ' + env.BACKSTAGE_SONARQUBE_TOKEN }}
      #   allowedHeaders: ['Authorization', 'Content-Type']
  reading:
    allow:
      - host: ${BACKSTAGE_STORAGE_HOST}
      - host: sdxcloud.visualstudio.com
      - host: dev.azure.com
      - host: sonarcloud.io

integrations:
  azure:
    - host: dev.azure.com #sdxcloud.visualstudio.com
      credentials:
        - personalAccessToken: ${BACKSTAGE_DEVOPS_TOKEN}
        # - clientId: ${BACKSTAGE_CLIENT_ID}
        #   clientSecret: ${BACKSTAGE_CLIENT_SECRET}
        #   tenantId: ${BACKSTAGE_TENANT_ID}
  azureDevOps:
    - host: dev.azure.com
      organization: sdxcloud
      token: ${BACKSTAGE_DEVOPS_TOKEN}

# Storage account report configuration
customStorage:
  host: ${BACKSTAGE_STORAGE_HOST}
  reportSasToken: ${BACKSTAGE_STORAGE_REPORT_SAS_TOKEN}

proxy:
  ### Example for how to add a proxy endpoint for the frontend.
  ### A typical reason to do this is to handle HTTPS and CORS for internal services.
  # endpoints:
  #   '/test':
  #     target: 'https://example.com'
  #     changeOrigin: true

# Reference documentation http://backstage.io/docs/features/techdocs/configuration
# Note: After experimenting with basic setup, use CI/CD to generate docs
# and an external cloud storage when deploying TechDocs for production use-case.
# https://backstage.io/docs/features/techdocs/how-to-guides#how-to-migrate-from-techdocs-basic-to-recommended-deployment-approach
techdocs:
  builder: 'external'
  publisher:
    type: 'azureBlobStorage'
    azureBlobStorage:
      containerName: 'documentation'
      credentials:
        accountName: ${BACKSTAGE_STORAGE_ACCOUNT}
        accountKey: ${BACKSTAGE_STORAGE_KEY}
  # Disable search indexing for now to avoid the search index error
  search:
    enabled: false

# auth:
#   # see https://backstage.io/docs/auth/ to learn about auth providers
#   providers:
#     # See https://backstage.io/docs/auth/guest/provider
#     guest: {}

auth:
  environment: development
  experimentalExtraAllowedOrigins:
    - http://localhost:3000
    - http://localhost:7007
  providers:
    guest: {}
    # Microsoft auth disabled for local development
    # Uncomment and set env vars to enable: BACKSTAGE_CLIENT_ID, BACKSTAGE_CLIENT_SECRET, BACKSTAGE_TENANT_ID
    microsoft:
      development:
        clientId: ${BACKSTAGE_CLIENT_ID}
        clientSecret: ${BACKSTAGE_CLIENT_SECRET}
        tenantId: ${BACKSTAGE_TENANT_ID}
        domainHint: ${BACKSTAGE_TENANT_ID}
        signIn:
          resolvers:
            # See https://backstage.io/docs/auth/microsoft/provider#resolvers for more resolvers
            - resolver: emailLocalPartMatchingUserEntityName
              allowedDomains:
                - sodexo.com
              # Allow SSO users from allowed domains even if they have no User entity in the catalog
              dangerouslyAllowSignInWithoutUserInCatalog: true

scaffolder:
  # see https://backstage.io/docs/features/software-templates/configuration for software template options

catalog:
  import:
    entityFilename: catalog-info.yaml
    pullRequestBranchName: backstage-integration
  rules:
    - allow: [Component, System, API, Resource, Location]
  locations:

    # Sodexo data
    - type: file
      target: ./sodexo/all.yaml
      rules:
        - allow: [User, Group, Component, System, API, Resource, Location]

    # VM template
    - type: file
      target: ./sodexo/templates/azure-vm-template.yaml
      rules:
        - allow: [Template]

    # Patterns template
    - type: file
      target: ./sodexo/templates/azure-patterns-template.yaml
      rules:
        - allow: [Template]

    # Repository template
    - type: file
      target: ./sodexo/templates/azure-repo-template.yaml
      rules:
        - allow: [Template]

    # Bicep template
    - type: file
      target: ./sodexo/templates/azure-bicep-template.yaml
      rules:
        - allow: [Template]

    # Infrastructure configuration template
    - type: file
      target: ./sodexo/templates/infra-config-template.yaml
      rules:
        - allow: [Template]

    # AIP templates
    - type: file
      target: ../../sodexo/aip-template.yaml
      rules:
        - allow: [Template]

    # AIP Infrastructure Check template
    - type: file
      target: ./sodexo/templates/aip-infra-check-template.yaml
      rules:
        - allow: [Template]

    # Data Factory VM Workstation template
    - type: file
      target: ./sodexo/templates/azure-vm-workstation-template.yaml
      rules:
        - allow: [Template]

    # Bicep template
    - type: file
      target: ./sodexo/templates/azure-bicep-template-api.yaml
      rules:
        - allow: [API]

    # AIP catalog
    - type: file
      target: ./sodexo/aip-catalog.yaml
      rules:
        - allow: [User, Group, Component, System, API, Resource, Location]

    # 4Site catalog
    - type: file
      target: ./sodexo/4site-catalog.yaml
      rules:
        - allow: [User, Group, Component, System, API, Resource, Location]

    # ProductSwap catalog
    - type: file
      target: ./sodexo/productswap-catalog.yaml
      rules:
        - allow: [User, Group, Component, System, API, Resource, Location]

    # PowerChef catalog
    - type: file
      target: ./sodexo/powerchef-catalog.yaml
      rules:
        - allow: [User, Group, Component, System, API, Resource, Location]

  providers:
    azureDevOps:
      sdxcloudBackstageCatalogProvider: # identifies your dataset / provider independent of config changes
        organization: sdxcloud
        project: 'IST.GLB.GLB.DataFactory_DeveloperPlatform'
        repository: '*'
        path: /**/catalog-info.yaml
        schedule:
          frequency: { minutes: 2 }
          timeout: { minutes: 3 }

kubernetes:
  # see https://backstage.io/docs/features/kubernetes/configuration for kubernetes configuration options

# see https://backstage.io/docs/permissions/getting-started for more on the permission framework
permission:
  # setting this to `false` will disable permissions
  enabled: true

qeta:
  permissions: false
  allowAnonymous: true
