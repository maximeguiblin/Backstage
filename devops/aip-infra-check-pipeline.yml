parameters:
  - name: repo_url
    type: string
  - name: usecase_name
    type: string
  - name: environment
    type: string
    default: 'adb'
  - name: user_login
    type: string
    default: 'false'

variables:
  aip_docker: "aziecr1fpt999.azurecr.io/aip_devcontainer:latest"

jobs:
- job: CheckInfrastructure
  displayName: "AIP Infrastructure Check"
  container:
    image: $(aip_docker)
    endpoint: "SrvCnx_AIP_Docker_Registry"
  pool:
    vmImage: ubuntu-latest
  steps:
    - checkout: self
      displayName: 'Checkout Pipeline Repository'


    - script: |
        set -e
        echo "Validating pipeline parameters..."

        # Display all pipeline parameters
        echo "Pipeline Parameters:"
        echo "===================="
        echo "repo_url: ${{ parameters.repo_url }}"
        echo "usecase_name: ${{ parameters.usecase_name }}"
        echo "environment: ${{ parameters.environment }}"
        echo "user_login: ${{ parameters.user_login }}"
        echo ""

        # Check if repo_url is set
        if [ -z "${{ parameters.repo_url }}" ]; then
          echo "Error: 'repo_url' parameter is not initialized."
          exit 1
        fi

        # Check if usecase_name is set and part of repo
        if [ -z "${{ parameters.usecase_name }}" ]; then
          echo "Error: 'usecase_name' parameter is not initialized."
          exit 1
        fi
        SHORT_NAME=$(basename $(echo "${{ parameters.usecase_name }}" | tr '.' '/'))
        REPO_URL_LOWER=$(echo "${{ parameters.repo_url }}" | tr '[:upper:]' '[:lower:]')
        SHORT_NAME_LOWER=$(echo "$SHORT_NAME" | tr '[:upper:]' '[:lower:]')
        echo "Extracted short usecase name: ${SHORT_NAME_LOWER}"

        if [[ "$REPO_URL_LOWER" != *"$SHORT_NAME_LOWER"* ]]; then
          echo "Error: The usecase name 'SHORT_NAME_LOWER' is not found in the repo_url."
          echo "Repo URL: ${{ parameters.repo_url }}"
          exit 1
        else
          echo "Success: Usecase name is present in the repo_url."
        fi
        echo "##vso[task.setvariable variable=short_usecase_name]${SHORT_NAME_LOWER}"

        # Check if user_login is valid (true or false)
        if [ "${{ parameters.user_login }}" != "true" ] && [ "${{ parameters.user_login }}" != "false" ]; then
          echo "Error: 'user_login' parameter must be either 'true' or 'false', but got: '${{ parameters.user_login }}'"
          exit 1
        fi

        # Validate repository URL by attempting to clone it
        echo "Validating repository URL now..."
        if [[ "${{ parameters.repo_url }}" != *"@"* ]]; then
          AZ_TOKEN=$(System.AccessToken)
          REPO_URL_WITH_TOKEN=$(echo "${{ parameters.repo_url }}" | sed "s|https://|https://build:${AZ_TOKEN}@|")
        else
          REPO_URL_WITH_TOKEN="${{ parameters.repo_url }}"
        fi
        
        # Test clone to validate URL
        #echo "Cloning repository: $REPO_URL_WITH_TOKEN"
        #git clone "$REPO_URL_WITH_TOKEN" test_clone
        #if [ $? -ne 0 ]; then
        #  echo "Error: Failed to clone repository - URL may be invalid or access denied"
        #  exit 1
        #else
        #  rm -rf test_clone
        #  echo "Repository URL validation successful"
        #fi

        echo "All parameters are valid."
      displayName: "Validate Pipeline Parameters"

    - script: |
        set -e
        echo "Cloning usecase repository..."

        # Configure Git to disable terminal prompts
        git config --global core.askpass ""
        git config --global credential.helper ""

        if [[ "${{ parameters.repo_url }}" != *"@"* ]]; then
          AZ_TOKEN=$(System.AccessToken)
          REPO_URL_WITH_TOKEN=$(echo "${{ parameters.repo_url }}" | sed "s|https://|https://build:${AZ_TOKEN}@|")
        else
          REPO_URL_WITH_TOKEN="${{ parameters.repo_url }}"
        fi

        echo "Cloning repository..."
        git clone "$REPO_URL_WITH_TOKEN" repo

        if [ $? -eq 0 ]; then
          echo "Repository cloned successfully"
          echo "Repository contents:"
          ls -la repo/ | head -10
        else
          echo "Git clone failed"
          echo "Debugging information:"
          echo "Token length: ${#AZ_TOKEN}"
          echo "Original URL: $REPO_URL"
          exit 1
        fi
      displayName: 'Clone Usecase Repository'

    - task: AzureCLI@2
      inputs:
        azureSubscription: 'Srv_Cnx_AIP_SANDBOX'
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          az account set --subscription 'SDX Sandbox'
          echo "Azure authentication completed successfully"
      condition: ne('${{ parameters.user_login }}', 'true')
      displayName: "Azure Authentication (Service Principal)"


    - script: |
        echo "Login on Azure..."
        az login --use-device-code
        az account set --subscription 'SDX Sandbox'
        echo "Azure authentication completed successfully"
      condition: eq('${{ parameters.user_login }}', 'true')
      displayName: "Azure Authentication (User Login)"

    - script: |
        set -e

        echo "Running AIP infrastructure check for environment: ${{ parameters.environment }}"
        cd repo
        REPO_DIR=$(pwd)

        # Find the conf directory and cd to its parent
        CONF_DIR=$(find . -name "conf" -type d | head -1)
        if [ -n "$CONF_DIR" ]; then
          echo "Found conf directory at: $CONF_DIR"
          cd "$(dirname "$CONF_DIR")"
          echo "Changed to parent directory: $(pwd)"
        else
          echo "Warning: conf directory not found, staying in current directory"
        fi


        if [ "${{ parameters.environment }}" = "adb" ]; then
          aip db workspace check --output_format json > "${REPO_DIR}/aip_check.html"
        elif [ "${{ parameters.environment }}" = "aml2" ]; then
          aip ml2 workspace test > "${REPO_DIR}/aip_check.html" #todo to be tested
        elif [ "${{ parameters.environment }}" = "aml" ]; then
          aip ml workspace check --format json 2>&1 | grep "WARNING : " | sed 's/.*WARNING : //' > "${REPO_DIR}/aip_check.html" #todo more test & fix command output
        else
          echo "Error: Unknown environment '${{ parameters.environment }}'"
          exit 1
        fi
      displayName: 'Execute AIP Infrastructure Check'

    - task: AzureCLI@2
      inputs:
        azureSubscription: 'Srv_Cnx_AIP_SANDBOX'
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          set -e

          # Set variables
          STORAGE_ACCOUNT_NAME="aziest1doc001"
          CONTAINER_NAME="report"
          RESOURCE_GROUP="IST-GLB-IENO-AIPWE-BOX-RG01"

          # Extract short usecase name

          echo "Uploading AIP check results to ADLS..."
          echo "Storage Account: $STORAGE_ACCOUNT_NAME"
          echo "Container: $CONTAINER_NAME"
          echo "Full Usecase Name: ${{ parameters.usecase_name }}"
          echo "Short Usecase Name: $(SHORT_USECASE_NAME)"

          # Upload the check HTML file (overwrites previous file)
          cd repo

          CHECK_FILE=$(ls aip_check.html 2>/dev/null | head -1)

          if [ -n "$CHECK_FILE" ]; then
            echo "Uploading $CHECK_FILE..."

            az storage blob upload \
              --subscription "SDX Sandbox" \
              --account-name $STORAGE_ACCOUNT_NAME \
              --container-name $CONTAINER_NAME \
              --name "aip/$(SHORT_USECASE_NAME)/aip_check.html" \
              --file "$CHECK_FILE" \
              --auth-mode key --verbose \
              --overwrite true
          else
            echo "Error: No aip_check.html file found"
            exit 1
          fi

          echo "Upload completed successfully!"
          echo "File uploaded to: https://${STORAGE_ACCOUNT_NAME}.blob.core.windows.net/${CONTAINER_NAME}/aip/${USECASE_NAME}/aip_check.html"
      displayName: 'Upload AIP Check Results to ADLS'