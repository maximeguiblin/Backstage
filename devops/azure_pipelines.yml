variables:
  artifactFeeds: AIP-feed
  serviceConnectionSandbox: Srv_Cnx_AIP_SANDBOX
  serviceConnectionSdxDev: GLB-SDP-DEVOPS-CICD-D

trigger:
- main
- develop

jobs:
  - job: ValidateSourceBranch
    displayName: Validate Source Branch
    steps:
      - script: |
          if [[ "$(System.PullRequest.TargetBranch)" == "refs/heads/main" ]] && [[ "$(System.PullRequest.SourceBranch)" != "refs/heads/develop" ]];
          then
            echo "Pull requests to 'main' are only allowed from 'develop'."
            exit 1
          else
            echo "Validation of source branch success"
          fi
        displayName: Check PR target branch for main


  - job: TestAndBuild
    pool:
      vmImage: ubuntu-latest
    container:
      image: aziecr1aip001.azurecr.io/aip_devcontainer
      endpoint: SDXSandbox_Docker_Registry
    steps:
      - task: PipAuthenticate@1
        inputs:
          artifactFeeds: $(artifactFeeds)
          onlyAddExtraIndex: true
        displayName: Pip authentication

      - task: NodeTool@0
        inputs:
          versionSpec: '18.x'
        displayName: Install Node.js

      - bash: |
          corepack enable
          corepack prepare yarn@stable --activate
        displayName: Enable Yarn

      - bash: |
          set -e
          cd src/backstage
          yarn install --frozen-lockfile
          yarn lint:all
        displayName: Run ESLint checks


